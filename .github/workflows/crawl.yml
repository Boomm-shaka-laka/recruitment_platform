# .github/workflows/run_crawler.yml

name: Run Crawler and Update Database

on:
  push:
    branches: [ "main" ]
  schedule:
    # 每天北京时间上午 9:00 和下午 3:00 执行
    - cron: '0 1 * * *'  
    - cron: '0 7 * * *'  

jobs:
  run-crawler-job:
    runs-on: ubuntu-latest

    steps:
      # 3. 第一步：检出您的代码仓库到虚拟机
      - name: Checkout repository
        uses: actions/checkout@v4

      # 4. 第二步：设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 5. 第三步：安装项目依赖
      # 注意：sqlite3 是 Python 内置库，无需安装
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests

      # 6. 第四步：运行您的爬虫脚本
      - name: Run crawler script
        run: python interface.py
