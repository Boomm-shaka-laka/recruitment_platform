mkdir -p .github/workflows
cat > .github/workflows/crawl.yml << 'EOF'
name: Daily Recruitment Crawler

on:
  schedule:
    - cron: '0 1,7 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler and save to DB
        run: |
          python interface.py

      - name: Commit and push updated database
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add recruitment.db
          if ! git diff --quiet --exit-code recruitment.db; then
            git commit -m "chore: update recruitment.db after crawl"
            git push
          else
            echo "No changes, skip commit."
          fi
EOF