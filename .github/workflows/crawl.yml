 1 name: Daily Recruitment Crawler
 2 
 3 on:
 4   schedule:
 5     - cron: '0 1,7 * * *'
 6   workflow_dispatch:
 7 
 8 jobs:
 9   crawl:
10     runs-on: ubuntu-latest
11 
12     steps:
13       - name: Checkout code
14         uses: actions/checkout@v4
15 
16       - name: Set up Python
17         uses: actions/setup-python@v5
18         with:
19           python-version: '3.10'
20 
21       - name: Install dependencies
22         run: |
23           python -m pip install --upgrade pip
24           pip install -r requirements.txt
25 
26       - name: Run crawler and save to DB
27         run: |
28           python interface.py
29 
30       - name: Commit and push updated database
31         run: |
32           git config --global user.name 'github-actions[bot]'
33           git config --global user.email 'github-actions[bot]@users.noreply.github.com'
34           git add recruitment.db
35           git diff --quiet --exit-code recruitment.db || git commit -m "chore: update recruitment.db after crawl"
36           git push
