name: Daily Recruitment Crawler

on:
  schedule:
    # 每天 9:00 和 15:00（UTC+8 北京时间）
    # GitHub Actions 使用 UTC 时间：北京时间 9:00 = UTC 1:00，15:00 = UTC 7:00
    - cron: '0 1,7 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler and save to DB
        run: |
          python interface.py

      - name: Commit and push updated database
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add recruitment.db
          git diff --quiet --exit-code recruitment.db || git commit -m "chore: update recruitment.db after crawl"
          git push
