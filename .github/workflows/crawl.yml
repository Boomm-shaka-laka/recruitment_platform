# .github/workflows/run_crawler.yml

# 1. 定义工作流的名称和触发条件
name: Run Crawler and Update Database

# 在 main 分支有推送时，以及每天的 9:00 和 15:00 触发此工作流
on:
  push:
    branches: [ "main" ]
  schedule:
    # - cron: '0 9 * * *'   # 每天 UTC 时间 9:00 (北京时间 17:00) 执行
    # - cron: '0 15 * * *'  # 每天 UTC 时间 15:00 (北京时间 23:00) 执行
    # 使用下面两行来匹配您要求的北京时间 9:00 和 15:00
    - cron: '0 1 * * *'  # 每天 UTC 时间 1:00 (北京时间上午 9:00) 执行
    - cron: '0 7 * * *'  # 每天 UTC 时间 7:00 (北京下午 3:00) 执行

# 2. 定义工作的具体步骤
jobs:
  run-crawler-job:
    # 指定运行环境为 Ubuntu 最新版
    runs-on: ubuntu-latest

    steps:
      # 3. 第一步：检出您的代码仓库到虚拟机
      - name: Checkout repository
        uses: actions/checkout@v4

      # 4. 第二步：设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # 使用最新的 Python 3.x 版本

      # 5. 第三步：安装项目依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests sqlite3

      # 6. 第四步：运行您的爬虫脚本
      - name: Run crawler script
        run: python interface.py

      # 7. (可选) 第五步：将更新后的数据库推回仓库
      # 如果您希望将爬取后更新的 recruitment.db 文件也保存在仓库里，
      # 可以取消注释下面的步骤。请注意，不建议将大型或频繁变动的数据库文件存储在 Git 中。
      # - name: Commit and push database changes (Optional)
      #   run: |
      #     git config --local user.email "action@github.com"
      #     git config --local user.name "GitHub Action"
      #     git add recruitment.db
      #     git commit -m "Update recruitment.db from scheduled crawl" || exit 0
      #     git push
